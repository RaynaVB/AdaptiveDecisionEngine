name: Deploy Recommendations Service

on:
  push:
    branches:
      - main
    paths:
      - 'functions/recommendation_service/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Create venv and Install Dependencies
        working-directory: functions/recommendation_service
        run: |
          python -m venv venv
          ./venv/bin/pip install -r requirements.txt

      - name: Deploy to Firebase
        uses: w9jds/firebase-action@master
        with:
          args: deploy --only functions:recommendations --project adaptivehealthengine
        env:
          GCP_SA_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_ADAPTIVEHEALTHENGINE }}
