version: 1

preprocessing:
  lowercase: true
  trim_whitespace: true
  collapse_internal_whitespace: true
  strip_punctuation: true
  singularize_basic_plurals: true

remove_tokens:
  quantities:
    - cup
    - cups
    - tablespoon
    - tablespoons
    - tbsp
    - teaspoon
    - teaspoons
    - tsp
    - ounce
    - ounces
    - gram
    - grams
    - pound
    - pounds
  preparation_words:
    - chopped
    - diced
    - minced
    - sliced
    - crushed
    - peeled
    - roasted
    - fresh
    - frozen
    - cooked
    - raw
    - boneless
    - skinless
    - drained
    - rinsed
  descriptor_words:
    - organic
    - large
    - small
    - medium
    - extra
    - virgin
    - lean
    - unsalted
    - salted
    - plain

phrase_rules:
  - pattern: "\bextra virgin olive oil\b"
    replacement: "olive oil"
  - pattern: "\bgarbanzo beans\b"
    replacement: "chickpeas"
  - pattern: "\bcoriander leaves\b"
    replacement: "cilantro"
  - pattern: "\bscallions\b"
    replacement: "green onion"
  - pattern: "\bmonosodium glutamate\b"
    replacement: "msg"
  - pattern: "\ball purpose flour\b"
    replacement: "wheat flour"
  - pattern: "\bheavy cream\b"
    replacement: "cream"

resolution_order:
  - exact_alias
  - normalized_alias
  - phrase_rule
  - synonym
  - fuzzy_match
  - unresolved_queue

fuzzy_match:
  enabled: true
  min_similarity: 0.92
  max_candidates: 5
